<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TOEIC 800 - 8/23</title>
<style>
:root{--acc:#2563eb;--bg:#f4f6fa;--card:#fff;--txt:#1e293b;--sub:#64748b;--ok:#16a34a;--ng:#dc2626;--line:#e2e8f0}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;background:var(--bg);color:var(--txt);padding-bottom:70px}
header{background:var(--acc);color:#fff;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
header h1{font-size:16px}
#countdown{font-size:13px;background:rgba(255,255,255,.18);padding:4px 10px;border-radius:12px}
main{max-width:640px;margin:0 auto;padding:14px}
.card{background:var(--card);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card h2{font-size:14px;color:var(--sub);margin-bottom:10px;font-weight:600}
nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);display:flex;z-index:10}
nav button{flex:1;padding:12px 0 14px;border:none;background:none;font-size:12px;color:var(--sub);cursor:pointer}
nav button.act{color:var(--acc);font-weight:700}
.tab{display:none}.tab.show{display:block}
.big{font-size:28px;font-weight:700}
.row{display:flex;gap:10px}
.row>div{flex:1}
.stat{text-align:center;padding:8px 0}
.stat .n{font-size:22px;font-weight:700}
.stat .l{font-size:11px;color:var(--sub)}
.bar{height:8px;background:var(--line);border-radius:4px;overflow:hidden;margin-top:6px}
.bar>div{height:100%;background:var(--acc);border-radius:4px;transition:width .3s}
button.pri{width:100%;padding:14px;border:none;border-radius:10px;background:var(--acc);color:#fff;font-size:16px;font-weight:700;cursor:pointer}
button.pri:disabled{background:#94a3b8}
button.sec{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--txt);font-size:14px;cursor:pointer;margin-top:8px}
#qWord{font-size:34px;font-weight:700;text-align:center;padding:26px 0 6px;letter-spacing:.5px}
#qPos{text-align:center;color:var(--sub);font-size:13px;margin-bottom:16px}
.choice{display:block;width:100%;padding:13px;margin-bottom:8px;border:1.5px solid var(--line);border-radius:10px;background:var(--card);font-size:15px;text-align:left;cursor:pointer}
.choice.ok{border-color:var(--ok);background:#f0fdf4}
.choice.ng{border-color:var(--ng);background:#fef2f2}
#qProg{font-size:12px;color:var(--sub);text-align:center;margin-bottom:4px}
input,select,textarea{width:100%;padding:10px;border:1px solid var(--line);border-radius:8px;font-size:15px;background:#fff;color:var(--txt)}
label{font-size:12px;color:var(--sub);display:block;margin:8px 0 4px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:7px 4px;border-bottom:1px solid var(--line);text-align:left}
th{color:var(--sub);font-weight:600;font-size:11px}
.del{color:var(--ng);cursor:pointer;border:none;background:none;font-size:13px}
.weak{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);font-size:14px}
.weak b{font-weight:700}
.weak span{color:var(--sub);font-size:13px;text-align:right;max-width:60%}
.note{font-size:12px;color:var(--sub);line-height:1.6;margin-top:8px}
svg text{font-family:inherit}
.pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;background:#eff6ff;color:var(--acc);margin-left:6px}
</style>
</head>
<body>
<header><h1>TOEIC 800</h1><div id="countdown"></div></header>
<main>

<div id="tab-home" class="tab show">
  <div class="card">
    <h2>今日のノルマ</h2>
    <div class="row">
      <div class="stat"><div class="n" id="hNew">-</div><div class="l">新規単語</div><div class="bar"><div id="hNewBar"></div></div></div>
      <div class="stat"><div class="n" id="hRev">-</div><div class="l">復習</div><div class="bar"><div id="hRevBar"></div></div></div>
    </div>
    <button class="pri" style="margin-top:10px" onclick="startQuiz()">単語学習を始める</button>
  </div>
  <div class="card">
    <h2>学習状況</h2>
    <div class="row">
      <div class="stat"><div class="n" id="hStreak">0</div><div class="l">連続日数</div></div>
      <div class="stat"><div class="n" id="hLearned">0</div><div class="l">学習済み語</div></div>
      <div class="stat"><div class="n" id="hMaster">0</div><div class="l">定着語</div></div>
    </div>
  </div>
  <div class="card">
    <h2>苦手単語 (誤答2回以上)</h2>
    <div id="hWeak"></div>
  </div>
  <div class="card">
    <h2>直近の演習</h2>
    <div id="hRecent"></div>
  </div>
</div>

<div id="tab-quiz" class="tab">
  <div class="card" id="quizBox">
    <div id="qProg"></div>
    <div id="qWord"></div>
    <div id="qPos"></div>
    <div id="qChoices"></div>
  </div>
</div>

<div id="tab-rec" class="tab">
  <div class="card">
    <h2>演習を記録 (公式問題集など)</h2>
    <label>日付</label><input type="date" id="rDate">
    <div class="row">
      <div><label>種別</label>
        <select id="rPart">
          <option>Part 1-2</option><option>Part 3</option><option>Part 4</option>
          <option>Part 5</option><option>Part 6</option><option selected>Part 7</option>
          <option>模試(L)</option><option>模試(R)</option><option>模試(全)</option>
        </select></div>
      <div><label>所要時間(分)</label><input type="number" id="rMin" min="0" inputmode="numeric"></div>
    </div>
    <div class="row">
      <div><label>問題数</label><input type="number" id="rQ" min="1" inputmode="numeric"></div>
      <div><label>正答数</label><input type="number" id="rC" min="0" inputmode="numeric"></div>
    </div>
    <label>メモ (教材名・気づき)</label><input type="text" id="rMemo" placeholder="公式11 Test1 など">
    <button class="pri" style="margin-top:12px" onclick="addRec()">記録する</button>
  </div>
  <div class="card">
    <h2>Part 7 の推移 (正答率% / 秒/問)</h2>
    <div id="chart"></div>
    <div class="note">青=正答率%(目標85%) 橙=1問あたり秒(目標60秒以下)</div>
  </div>
  <div class="card">
    <h2>記録一覧</h2>
    <table><thead><tr><th>日付</th><th>種別</th><th>正答</th><th>率</th><th>秒/問</th><th></th></tr></thead><tbody id="recBody"></tbody></table>
  </div>
</div>

<div id="tab-data" class="tab">
  <div class="card">
    <h2>Google同期 (自動)</h2>
    <div id="syncStatus" class="note">読み込み中...</div>
    <button class="pri" id="syncBtn" style="margin-top:10px" onclick="syncAction()">Googleでログイン</button>
  </div>
  <div class="card">
    <h2>バックアップ (手動)</h2>
    <div class="note">Google同期を使わない場合や、バックアップを残したい場合に使います。</div>
    <button class="pri" style="margin-top:12px" onclick="exportData()">データを書き出す (ファイル保存)</button>
    <button class="sec" onclick="copyData()">クリップボードにコピー</button>
    <label style="margin-top:14px">読み込み (ファイル)</label>
    <input type="file" id="impFile" accept=".json" onchange="importFile(this)">
    <label>読み込み (貼り付け)</label>
    <textarea id="impText" rows="3" placeholder="書き出したJSONを貼り付け"></textarea>
    <button class="sec" onclick="importText()">貼り付けたデータを読み込む</button>
  </div>
  <div class="card">
    <h2>設定</h2>
    <label>1日の新規単語数</label>
    <input type="number" id="setDaily" min="5" max="50" onchange="setDaily(this.value)">
    <div class="note">収録 <span id="totalWords"></span>語。8/23までに全語を1周するには残り日数で割った数以上に設定。</div>
    <button class="sec" style="color:var(--ng);margin-top:14px" onclick="resetAll()">全データを初期化</button>
  </div>
</div>

</main>
<nav>
  <button id="nav-home" class="act" onclick="showTab('home')">ホーム</button>
  <button id="nav-quiz" onclick="showTab('quiz');startQuiz()">単語</button>
  <button id="nav-rec" onclick="showTab('rec')">記録</button>
  <button id="nav-data" onclick="showTab('data')">データ</button>
</nav>

// ===== 状態 =====
const KEY="toeic800v1";
const EXAM="2026-08-23";
const INTERVALS=[0,1,3,7,14,30];
let S=load();
function init(){return{words:{},log:{},records:[],daily:15}}
function load(){try{const d=JSON.parse(localStorage.getItem(KEY));return d&&d.words?Object.assign(init(),d):init()}catch(e){return init()}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(S))}catch(e){}queuePush()}
function today(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function addDays(ds,n){const d=new Date(ds+"T00:00:00");d.setDate(d.getDate()+n);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function logToday(){const t=today();if(!S.log[t])S.log[t]={nw:0,rv:0,ok:0,tot:0};return S.log[t]}
// ===== タブ =====
function showTab(n){document.querySelectorAll(".tab").forEach(e=>e.classList.remove("show"));document.querySelectorAll("nav button").forEach(e=>e.classList.remove("act"));document.getElementById("tab-"+n).classList.add("show");document.getElementById("nav-"+n).classList.add("act");if(n==="home")renderHome();if(n==="rec")renderRec();if(n==="data")renderData();window.scrollTo(0,0)}
// ===== ホーム =====
function dueList(){const t=today();return Object.keys(S.words).filter(i=>S.words[i].box>=1&&S.words[i].due<=t)}
function newList(){return DATA.map((_,i)=>String(i)).filter(i=>!S.words[i])}
function renderHome(){
  const lg=logToday(),due=dueList(),newQuota=S.daily;
  const nwDone=lg.nw,rvTotal=due.length+lg.rv;
  document.getElementById("hNew").textContent=nwDone+" / "+newQuota;
  document.getElementById("hRev").textContent=lg.rv+" / "+rvTotal;
  document.getElementById("hNewBar").style.width=Math.min(100,newQuota?nwDone/newQuota*100:0)+"%";
  document.getElementById("hRevBar").style.width=Math.min(100,rvTotal?lg.rv/rvTotal*100:0)+"%";
  let streak=0,d=today();
  if(!S.log[d]||S.log[d].tot===0)d=addDays(d,-1);
  while(S.log[d]&&S.log[d].tot>0){streak++;d=addDays(d,-1)}
  document.getElementById("hStreak").textContent=streak;
  const ws=Object.values(S.words);
  document.getElementById("hLearned").textContent=Object.keys(S.words).length;
  document.getElementById("hMaster").textContent=ws.filter(w=>w.box>=4).length;
  const weak=Object.keys(S.words).filter(i=>S.words[i].wrong>=2).sort((a,b)=>S.words[b].wrong-S.words[a].wrong).slice(0,10);
  document.getElementById("hWeak").innerHTML=weak.length?weak.map(i=>'<div class="weak"><b>'+DATA[i][0]+'</b><span>'+DATA[i][2]+' <em style="color:var(--ng);font-style:normal">×'+S.words[i].wrong+'</em></span></div>').join(""):'<div class="note">まだありません</div>';
  const rec=S.records.slice(-3).reverse();
  document.getElementById("hRecent").innerHTML=rec.length?rec.map(r=>'<div class="weak"><b>'+r.d.slice(5)+' '+r.part+'</b><span>'+r.c+'/'+r.q+' ('+Math.round(r.c/r.q*100)+'%)'+(r.min?' '+Math.round(r.min*60/r.q)+'秒/問':'')+'</span></div>').join(""):'<div class="note">記録タブから公式問題集の演習結果を入力してください</div>';
}
// ===== クイズ =====
let queue=[],qi=0,sessionOK=0,answered=false;
function startQuiz(){
  showTabQuizOnly();
  const lg=logToday();
  const due=shuffle(dueList());
  const remainNew=Math.max(0,S.daily-lg.nw);
  const nw=newList().slice(0,remainNew);
  queue=due.concat(nw);qi=0;sessionOK=0;
  if(queue.length===0){endScreen("今日のノルマは完了しています。",true);return}
  showQ();
}
function showTabQuizOnly(){document.querySelectorAll(".tab").forEach(e=>e.classList.remove("show"));document.querySelectorAll("nav button").forEach(e=>e.classList.remove("act"));document.getElementById("tab-quiz").classList.add("show");document.getElementById("nav-quiz").classList.add("act")}
function showQ(){
  answered=false;
  const i=queue[qi],w=DATA[i];
  document.getElementById("qProg").textContent=(qi+1)+" / "+queue.length+(S.words[i]?"　復習":"　新規");
  document.getElementById("qWord").textContent=w[0];
  document.getElementById("qPos").textContent="["+w[1]+"]";
  const pool=DATA.filter((x,j)=>String(j)!==i&&x[1]===w[1]);
  const ds=shuffle(pool.slice()).slice(0,3).map(x=>x[2]);
  const opts=shuffle([w[2]].concat(ds));
  document.getElementById("qChoices").innerHTML=opts.map(o=>'<button class="choice" onclick="pick(this)">'+o+'</button>').join("");
}
function pick(btn){
  if(answered)return;answered=true;
  const i=queue[qi],w=DATA[i],correct=btn.textContent===w[2];
  document.querySelectorAll(".choice").forEach(b=>{if(b.textContent===w[2])b.classList.add("ok")});
  if(!correct)btn.classList.add("ng");
  const lg=logToday();
  const isNew=!S.words[i];
  if(isNew){S.words[i]={box:1,due:addDays(today(),1),wrong:0};lg.nw++}
  else{
    const st=S.words[i];lg.rv++;
    if(correct){st.box=Math.min(5,st.box+1)}else{st.box=1;st.wrong++}
    st.due=addDays(today(),INTERVALS[st.box]);
  }
  if(!correct&&isNew){S.words[i].wrong++}
  lg.tot++;if(correct){lg.ok++;sessionOK++}
  save();
  setTimeout(next,correct?600:1500);
}
function next(){qi++;if(qi>=queue.length){endScreen("セッション完了: "+sessionOK+" / "+queue.length+" 正解",false)}else{showQ()}}
function endScreen(msg,done){
  document.getElementById("qProg").textContent="";
  document.getElementById("qWord").textContent=done?"✓":"お疲れさまでした";
  document.getElementById("qWord").style.fontSize="22px";
  document.getElementById("qPos").textContent=msg;
  document.getElementById("qChoices").innerHTML='<button class="pri" onclick="startQuiz()">続けて学習する</button><button class="sec" onclick="showTab(\'home\')">ホームへ戻る</button>';
}

function addRec(){
  const d=document.getElementById("rDate").value||today();
  const part=document.getElementById("rPart").value;
  const q=parseInt(document.getElementById("rQ").value),c=parseInt(document.getElementById("rC").value);
  const min=parseFloat(document.getElementById("rMin").value)||0;
  const memo=document.getElementById("rMemo").value;
  if(!q||isNaN(c)||c>q){alert("問題数と正答数を確認してください");return}
  S.records.push({d,part,q,c,min,memo});
  S.records.sort((a,b)=>a.d<b.d?-1:1);
  save();
  document.getElementById("rQ").value="";document.getElementById("rC").value="";document.getElementById("rMin").value="";document.getElementById("rMemo").value="";
  renderRec();
}
function delRec(i){if(confirm("この記録を削除しますか")){S.records.splice(i,1);save();renderRec()}}
function renderRec(){
  document.getElementById("rDate").value=today();
  const tb=document.getElementById("recBody");
  tb.innerHTML=S.records.map((r,i)=>'<tr><td>'+r.d.slice(5)+'</td><td>'+r.part+(r.memo?'<span class="pill">'+r.memo+'</span>':'')+'</td><td>'+r.c+'/'+r.q+'</td><td>'+Math.round(r.c/r.q*100)+'%</td><td>'+(r.min?Math.round(r.min*60/r.q):"-")+'</td><td><button class="del" onclick="delRec('+i+')">削除</button></td></tr>').reverse().join("");
  drawChart();
}
function drawChart(){
  const el=document.getElementById("chart");
  const p7=S.records.filter(r=>r.part==="Part 7");
  if(p7.length<2){el.innerHTML='<div class="note">Part 7の記録が2件以上で表示されます</div>';return}
  const W=600,H=200,pad=30;
  const n=p7.length,x=i=>pad+i*(W-2*pad)/(n-1);
  const acc=p7.map(r=>r.c/r.q*100);
  const spd=p7.map(r=>r.min?r.min*60/r.q:null);
  const yA=v=>H-pad-(v/100)*(H-2*pad);
  const maxS=Math.max(90,...spd.filter(v=>v!=null));
  const yS=v=>H-pad-(v/maxS)*(H-2*pad);
  let svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%">';
  svg+='<line x1="'+pad+'" y1="'+yA(85)+'" x2="'+(W-pad)+'" y2="'+yA(85)+'" stroke="#16a34a" stroke-dasharray="4" stroke-width="1"/>';
  svg+='<text x="'+(W-pad)+'" y="'+(yA(85)-4)+'" font-size="10" fill="#16a34a" text-anchor="end">85%</text>';
  svg+='<polyline fill="none" stroke="#2563eb" stroke-width="2" points="'+acc.map((v,i)=>x(i)+","+yA(v)).join(" ")+'"/>';
  acc.forEach((v,i)=>{svg+='<circle cx="'+x(i)+'" cy="'+yA(v)+'" r="3" fill="#2563eb"/><text x="'+x(i)+'" y="'+(yA(v)-7)+'" font-size="10" fill="#2563eb" text-anchor="middle">'+Math.round(v)+'</text>'});
  const sp=spd.map((v,i)=>v!=null?x(i)+","+yS(v):null).filter(Boolean);
  if(sp.length>1){svg+='<polyline fill="none" stroke="#ea580c" stroke-width="2" stroke-dasharray="5" points="'+sp.join(" ")+'"/>';
    spd.forEach((v,i)=>{if(v!=null)svg+='<circle cx="'+x(i)+'" cy="'+yS(v)+'" r="3" fill="#ea580c"/><text x="'+x(i)+'" y="'+(yS(v)+14)+'" font-size="10" fill="#ea580c" text-anchor="middle">'+Math.round(v)+'</text>'})}
  p7.forEach((r,i)=>{svg+='<text x="'+x(i)+'" y="'+(H-8)+'" font-size="9" fill="#64748b" text-anchor="middle">'+r.d.slice(5)+'</text>'});
  svg+='</svg>';
  el.innerHTML=svg;
}
// ===== Google同期 (Firebase) =====
let fbUser=null,fbDb=null,syncTimer=null,lastSync=null;
function fbReady(){return FB_CONFIG&&typeof firebase!=="undefined"}
function fbInit(){
  if(!fbReady())return;
  try{
    firebase.initializeApp(FB_CONFIG);
    fbDb=firebase.firestore();
    firebase.auth().onAuthStateChanged(u=>{fbUser=u;renderSync();if(u)pullMerge()});
  }catch(e){console.error(e)}
}
function syncAction(){
  if(!fbReady()){alert("同期は未設定です。Firebaseの設定値の組み込みが必要です。");return}
  if(fbUser){if(confirm("ログアウトしますか?(この端末のデータは残ります)"))firebase.auth().signOut()}
  else{
    const p=new firebase.auth.GoogleAuthProvider();
    firebase.auth().signInWithPopup(p).catch(()=>firebase.auth().signInWithRedirect(p));
  }
}
function mergeState(a,b){
  if(!b||!b.words)return a;
  const m=init();m.daily=a.daily||b.daily||15;
  new Set(Object.keys(a.words).concat(Object.keys(b.words))).forEach(k=>{
    const x=a.words[k],y=b.words[k];
    if(!x){m.words[k]=y}else if(!y){m.words[k]=x}
    else{const w=x.due>=y.due?x:y;m.words[k]={box:w.box,due:w.due,wrong:Math.max(x.wrong||0,y.wrong||0)}}
  });
  new Set(Object.keys(a.log).concat(Object.keys(b.log))).forEach(k=>{
    const x=a.log[k],y=b.log[k];
    m.log[k]=!x?y:!y?x:(x.tot>=y.tot?x:y);
  });
  const seen={};
  (a.records||[]).concat(b.records||[]).forEach(r=>{
    const id=[r.d,r.part,r.q,r.c,r.min,r.memo||""].join("|");
    if(!seen[id]){seen[id]=1;m.records.push(r)}
  });
  m.records.sort((x,y)=>x.d<y.d?-1:1);
  return m;
}
function pullMerge(){
  if(!fbDb||!fbUser)return;
  fbDb.collection("users").doc(fbUser.uid).get().then(snap=>{
    if(snap.exists)S=mergeState(S,snap.data().state);
    try{localStorage.setItem(KEY,JSON.stringify(S))}catch(e){}
    pushNow();renderHome();renderSync();
  }).catch(e=>{console.error(e);renderSync("同期エラー: "+e.code)});
}
function pushNow(){
  if(!fbDb||!fbUser)return;
  fbDb.collection("users").doc(fbUser.uid).set({state:S,updatedAt:Date.now()})
    .then(()=>{lastSync=new Date();renderSync()})
    .catch(e=>{console.error(e);renderSync("同期エラー: "+e.code)});
}
function queuePush(){if(!fbDb||!fbUser)return;clearTimeout(syncTimer);syncTimer=setTimeout(pushNow,2000)}
function renderSync(err){
  const st=document.getElementById("syncStatus"),btn=document.getElementById("syncBtn");
  if(!st)return;
  if(err){st.textContent=err;return}
  if(!fbReady()){st.textContent="未設定。Firebase設定の組み込みが必要です。";btn.textContent="Googleでログイン";return}
  if(fbUser){st.textContent="ログイン中: "+(fbUser.email||"")+(lastSync?" ｜ 最終同期 "+lastSync.toLocaleTimeString():" ｜ 同期待機中");btn.textContent="ログアウト"}
  else{st.textContent="未ログイン。ログインすると全端末で自動同期されます。";btn.textContent="Googleでログイン"}
}
// ===== データ =====
function renderData(){document.getElementById("setDaily").value=S.daily;document.getElementById("totalWords").textContent=DATA.length;renderSync()}
function setDaily(v){S.daily=Math.max(5,Math.min(50,parseInt(v)||15));save()}
function exportData(){
  const blob=new Blob([JSON.stringify(S)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="toeic800_data_"+today()+".json";a.click();
}
function copyData(){navigator.clipboard.writeText(JSON.stringify(S)).then(()=>alert("コピーしました")).catch(()=>alert("コピーできませんでした。書き出しを使ってください"))}
function applyImport(txt){
  try{const d=JSON.parse(txt);if(!d.words||!d.records)throw 0;S=Object.assign(init(),d);save();alert("読み込みました");showTab("home")}
  catch(e){alert("データ形式が不正です")}
}
function importFile(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=()=>applyImport(r.result);r.readAsText(f)}
function importText(){const t=document.getElementById("impText").value.trim();if(t)applyImport(t)}
function resetAll(){if(confirm("全データを削除します。よろしいですか")&&confirm("本当に初期化しますか")){localStorage.removeItem(KEY);S=init();showTab("home")}}
// ===== カウントダウン =====
function countdown(){
  const now=new Date(),exam=new Date(EXAM+"T00:00:00");
  const days=Math.ceil((exam-now)/86400000);
  document.getElementById("countdown").textContent=days>0?"8/23まで あと"+days+"日":days===0?"本番当日":"試験終了";
}
countdown();renderHome();fbInit();
</script>
